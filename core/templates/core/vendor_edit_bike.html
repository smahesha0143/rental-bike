{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-6 flex items-center">
        <a href="{% url 'vendor_manage_bikes' %}" class="text-brand-600 hover:text-brand-800 text-sm font-medium flex items-center">
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Manage Bikes
        </a>
    </div>

    <div class="bg-white shadow sm:rounded-lg border border-gray-100">
        <div class="px-4 py-5 sm:p-6">
            <h3 class="text-lg leading-6 font-medium text-gray-900 mb-5">{{ title }}</h3>
            
            <form action="" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                    {% for field in form %}
                    <div class="sm:col-span-6 {% if field.name == 'price_per_hour' or field.name == 'price_per_day' or field.name == 'latitude' or field.name == 'longitude' %}sm:col-span-3{% endif %}">
                        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                        <div class="mt-1">
                            {{ field }}
                        </div>
                        {% if field.errors %}
                        <p class="mt-2 text-sm text-red-600">{{ field.errors.as_text }}</p>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                
                <div class="mt-6 flex justify-end space-x-3">
                    <a href="{% url 'vendor_manage_bikes' %}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                        Cancel
                    </a>
                    <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                        Save Bike
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
