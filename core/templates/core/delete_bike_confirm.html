{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white shadow sm:rounded-lg border border-red-200 overflow-hidden">
        <div class="px-4 py-5 sm:p-6 bg-red-50 text-center">
            <svg class="mx-auto h-12 w-12 text-red-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <h3 class="text-lg leading-6 font-medium text-red-800 mb-2">Delete Bike Confirmation</h3>
            <p class="text-sm text-red-600 mb-6">Are you sure you want to delete <strong>{{ bike.bike_name }}</strong>? This action cannot be undone.</p>
            
            <form action="" method="POST" class="flex justify-center flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3">
                {% csrf_token %}
                <button type="submit" class="inline-flex justify-center py-2 px-6 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    Yes, delete it
                </button>
                <a href="{% url 'manage_bikes' %}" class="inline-flex justify-center py-2 px-6 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
