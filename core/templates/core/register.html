{% extends 'base.html' %}
{% block title %}Register - Digital Rental Bikes{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white rounded-xl shadow-md overflow-hidden p-8 border border-gray-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900">Create an Account</h2>
        <p class="mt-2 text-sm text-gray-600">Join Digital Rental Bikes today</p>
    </div>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="[&>p]:mb-4 [&>p>input]:block [&>p>input]:w-full [&>p>input]:rounded-md [&>p>input]:border-gray-300 [&>p>input]:shadow-sm [&>p>input]:focus:border-brand-500 [&>p>input]:focus:ring-brand-500 [&>p>input]:p-2 [&>p>input]:sm:text-sm [&>p>input]:border [&>p>label]:block [&>p>label]:text-sm [&>p>label]:font-medium [&>p>label]:text-gray-700 [&>p>label]:mb-1 [&>p>span]:text-xs [&>p>span]:text-gray-500 [&>ul]:text-xs [&>ul]:text-red-500">
            {{ form.as_p }}
        </div>
        <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
            Register
        </button>
    </form>
    <div class="mt-6 text-center text-sm">
        <p class="text-gray-600">Already have an account? <a href="{% url 'login' %}" class="font-medium text-brand-600 hover:text-brand-500">Log in</a></p>
    </div>
</div>
{% endblock %}
