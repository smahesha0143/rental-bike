{% extends 'base.html' %}
{% block title %}Payment Successful - Digital Rental Bikes{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20 text-center px-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="w-24 h-24 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-6">
            <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Payment Successful!</h2>
        <p class="text-gray-600 mb-8 leading-relaxed">Thank you for your booking. The bike has been securely reserved for you. We hope you enjoy your ride!</p>
        <div class="space-y-4">
            <a href="{% url 'home' %}" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
                Return to Home
            </a>
            <a href="{% url 'companies' %}" class="w-full flex justify-center py-3 px-4 border border-gray-300 rounded-lg shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
                Browse More Bikes
            </a>
        </div>
    </div>
</div>
{% endblock %}
