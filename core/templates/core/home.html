{% extends 'base.html' %}

{% block content %}
<div class="relative bg-white overflow-hidden">
    <div class="max-w-7xl mx-auto">
        <div class="relative z-10 pb-8 bg-white sm:pb-16 md:pb-20 lg:max-w-2xl lg:w-full lg:pb-28 xl:pb-32">
            <main class="mt-10 mx-auto max-w-7xl px-4 sm:mt-12 sm:px-6 md:mt-16 lg:mt-20 lg:px-8 xl:mt-28">
                <div class="sm:text-center lg:text-left">
                    <h1 class="text-4xl tracking-tight font-extrabold text-gray-900 sm:text-5xl md:text-6xl">
                        <span class="block xl:inline">Premium Rides for</span>
                        <span class="block text-brand-600 xl:inline">Every Journey</span>
                    </h1>
                    <p class="mt-3 text-base text-gray-500 sm:mt-5 sm:text-lg sm:max-w-xl sm:mx-auto md:mt-5 md:text-xl lg:mx-0">
                        Explore our extensive network of top-rated rental companies. Whether you need a sleek sports bike or a practical scooter, we've got you covered.
                    </p>
                    <div class="mt-5 sm:mt-8 sm:flex sm:justify-center lg:justify-start">
                        <div class="rounded-md shadow">
                            <a href="{% url 'companies' %}" class="w-full flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-white bg-brand-600 hover:bg-brand-700 md:py-4 md:text-lg transition-transform transform hover:-translate-y-1">
                                Browse Companies
                            </a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div class="lg:absolute lg:inset-y-0 lg:right-0 lg:w-1/2 bg-brand-50 flex items-center justify-center">
        <!-- Placeholder graphic using a gradient block to give a premium feel ->
        <div class="w-full h-64 sm:h-72 md:h-96 lg:h-full bg-gradient-to-br from-brand-400 to-indigo-600 flex items-center justify-center text-white p-10">
            <h2 class="text-4xl font-bold italic tracking-wider opacity-50 text-center">DigitalRentalBikes</h2>
        </div>
    </div>
</div>

<div class="bg-gray-50 py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3">
            <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-100 hover:shadow-lg transition-shadow">
                <div class="px-4 py-5 sm:p-6 text-center">
                    <dt class="text-sm font-medium text-gray-500 truncate">Total Companies</dt>
                    <dd class="mt-1 text-3xl font-semibold text-brand-600">{{ companies_count }}</dd>
                </div>
            </div>
            <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-100 hover:shadow-lg transition-shadow">
                <div class="px-4 py-5 sm:p-6 text-center">
                    <dt class="text-sm font-medium text-gray-500 truncate">Available Bikes</dt>
                    <dd class="mt-1 text-3xl font-semibold text-brand-600">{{ bikes_count }}</dd>
                </div>
            </div>
            <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-100 hover:shadow-lg transition-shadow">
                <div class="px-4 py-5 sm:p-6 text-center">
                    <dt class="text-sm font-medium text-gray-500 truncate">Happy Customers</dt>
                    <dd class="mt-1 text-3xl font-semibold text-brand-600">1,000+</dd>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
