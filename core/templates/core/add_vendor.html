{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-6 flex items-center">
        <a href="{% url 'admin_dashboard' %}" class="text-brand-600 hover:text-brand-800 text-sm font-medium flex items-center">
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Dashboard
        </a>
    </div>

    <div class="bg-white shadow sm:rounded-lg border border-gray-100">
        <div class="px-4 py-5 sm:p-6">
            <h3 class="text-lg leading-6 font-medium text-gray-900 mb-5">Add Rental Company</h3>
            
            <form action="" method="POST">
                {% csrf_token %}
                <div class="space-y-6">
                    {% for field in form %}
                    <div>
                        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                        <div class="mt-1">
                            {{ field }}
                        </div>
                        {% if field.errors %}
                        <p class="mt-2 text-sm text-red-600">{{ field.errors.as_text }}</p>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                
                <div class="mt-6">
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                        Save Company
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
